<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Productos</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #10b981; --primary-dark: #047857; --bg-color: #f3f4f6; --text-main: #1f2937; --text-muted: #6b7280; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 250px; background-color: var(--primary-dark); color: var(--white); display: flex; flex-direction: column; padding: 20px 0; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-weight: 700; }
        .nav-link { padding: 15px 25px; color: #d1fae5; text-decoration: none; display: flex; align-items: center; gap: 15px; }
        .nav-link.active { background-color: var(--primary); color: var(--white); border-left: 5px solid var(--white); }

        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-add { background-color: var(--primary); color: var(--white); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        
        /* Grid de productos */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
        .product-card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .product-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .product-price { font-size: 18px; color: var(--primary-dark); font-weight: bold; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--white); padding: 30px; border-radius: 12px; width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; }
    </style>
</head>
<body>

   <aside class="sidebar">
        <h2><i class="fa-solid fa-leaf"></i> EcoCRM</h2>
        <a href="/pageclientes/" class="nav-link"><i class="fa-solid fa-users"></i> Clientes</a>
        <a href="/pageempleados/" class="nav-link"><i class="fa-solid fa-id-badge"></i> Empleados</a>
        <a href="/pageproductos/" class="nav-link active"><i class="fa-solid fa-box-open"></i> Productos</a>
        <a href="/pageproveedores/" class="nav-link"><i class="fa-solid fa-truck-fast"></i> Proveedores</a>
        <a href="/pageusuarios/" class="nav-link"><i class="fa-solid fa-user-gear"></i> Usuarios</a>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>Catálogo de Productos</h2>
            <button class="btn-add" onclick="document.getElementById('modalProducto').style.display='flex'">
                <i class="fa-solid fa-plus"></i> Agregar Producto
            </button>
        </header>

        <div class="products-grid">
            {% for p in consultaproductos %}
            <div class="product-card">
                <h3 class="product-title">{{ p.nombre }}</h3>
                <p>{{ p.descripcion }}</p>
                <p class="product-price">${{ p.precio }}</p>
                <p>Stock: {{ p.stock }}</p>
            </div>
            {% empty %}
            <p>No hay productos registrados.</p>
            {% endfor %}
        </div>
    </main>

    <div class="modal" id="modalProducto">
        <div class="modal-content">
            <h3>Nuevo Producto</h3>
            <form action="/pageproductos/nuevo/" method="POST" style="margin-top:20px;">
                {% csrf_token %}
                <div class="form-group"><input type="text" name="nombre" placeholder="Nombre" required></div>
                <div class="form-group"><input type="text" name="descripcion" placeholder="Descripción" required></div>
                <div class="form-group"><input type="number" step="0.01" name="precio" placeholder="Precio" required></div>
                <div class="form-group"><input type="number" name="stock" placeholder="Stock" required></div>
                <button type="submit" class="btn-submit" style="width:100%">Guardar</button>
            </form>
        </div>
    </div>
    
    <script>
        window.onclick = function(e) { 
            let m = document.getElementById('modalProducto'); 
            if (e.target == m) m.style.display = 'none'; 
        }
    </script>
</body>
</html>
