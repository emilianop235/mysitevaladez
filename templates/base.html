<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}EcoCRM - Cyberpunk Edition{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tipografía Moderna Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Iconos de FontAwesome Pro -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Variables Neon Cyberpunk - Paleta Limpia Verde + Cian */
        :root {
            --bg-dark: #090d16; 
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            
            /* Paleta Neón Unificada */
            --neon-green: #00ffaa;    
            --neon-cyan: #00f2fe;     
            --warning: #f59e0b;       
            --danger: #ef4444;        
            
            /* Textos */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Luces de Fondo Fluidas */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }
        body::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 255, 170, 0.1) 0%, transparent 60%); top: -150px; right: -100px; z-index: 0; pointer-events: none; animation: float 12s ease-in-out infinite; }
        body::after { content: ''; position: absolute; width: 700px; height: 700px; background: radial-gradient(circle, rgba(0, 242, 254, 0.1) 0%, transparent 60%); bottom: -200px; left: -150px; z-index: 0; pointer-events: none; animation: float 15s ease-in-out infinite reverse; }

        /* BARRA LATERAL */
        .sidebar {
            width: 260px;
            background: rgba(10, 16, 30, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border);
            box-shadow: inset -1px 0 0 0 rgba(0, 255, 170, 0.15); 
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            z-index: 10;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.collapsed { width: 80px; }
        .sidebar.collapsed .link-text, .sidebar.collapsed .logo-text { display: none; }
        .sidebar.collapsed .nav-link { justify-content: center; padding: 12px 0; }
        .sidebar.collapsed .nav-link i { margin: 0; font-size: 20px; }
        .sidebar.collapsed .brand-container { justify-content: center; }
        .brand-container { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 30px; }
        
        @keyframes rainbow-text {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .brand-logo { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .brand-logo i { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .brand-logo span.logo-text {
            background: linear-gradient(270deg, var(--neon-green), var(--neon-cyan), var(--neon-green));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-text 4s ease infinite;
        }
        .toggle-btn { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 5px; }
        .toggle-btn:hover { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .nav-container { flex: 1; overflow-y: auto; padding: 0 15px; overflow-x: hidden; }
        .nav-container::-webkit-scrollbar { width: 4px; }
        .nav-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .nav-link { padding: 12px 15px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 15px; font-weight: 500; font-size: 14px; border-radius: 10px; transition: all 0.3s ease; margin-bottom: 6px; position: relative; overflow: hidden; border: 1px solid transparent; white-space: nowrap; }
        .nav-link i { font-size: 16px; width: 20px; text-align: center; }
        .nav-link:hover { color: var(--white); background: rgba(255, 255, 255, 0.04); }
        .nav-link.active { color: var(--white); font-weight: 700; background: linear-gradient(90deg, rgba(0, 255, 170, 0.15) 0%, transparent 100%); border-left: 3px solid var(--neon-green); box-shadow: inset 10px 0 20px -10px var(--neon-green); }
        .nav-link.active i { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        /* AREA DE TRABAJO PRINCIPAL */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; z-index: 5; position: relative; }
        .navbar { background: rgba(10, 16, 30, 0.4); backdrop-filter: blur(12px); padding: 18px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); }
        .navbar h2 { font-size: 18px; font-weight: 600; color: var(--white); display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.03); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border); font-size: 13px; font-weight: 500; }
        .workspace { display: flex; gap: 30px; padding: 30px 40px; flex: 1; overflow: hidden; }

        /* ESTILOS GLOBALES PARA COMPONENTES HIJOS */
        
        .glass-panel {
            background: var(--glass-bg) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 12px !important;
            padding: 25px !important;
            box-shadow: var(--glass-glow) !important;
        }

        .glass-input, select.glass-input, textarea.glass-input {
            width: 100% !important;
            background: rgba(7, 10, 19, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: var(--white) !important;
            padding: 11px 14px !important;
            border-radius: 8px !important;
            font-size: 14px !important;
            outline: none !important;
            transition: all 0.3s ease !important;
        }
        .glass-input:focus, select.glass-input:focus {
            border-color: var(--neon-green) !important;
            box-shadow: 0 0 12px rgba(0, 255, 170, 0.25) !important;
            background: rgba(7, 10, 19, 0.9) !important;
        }

        .btn-submit {
            display: block !important;
            width: 100% !important;
            padding: 12px 20px !important;
            background: linear-gradient(135deg, var(--neon-green) 0%, var(--neon-cyan) 100%) !important;
            color: #05080f !important; 
            font-weight: 700 !important;
            font-size: 14px !important;
            border: none !important;
            border-radius: 8px !important;
            cursor: pointer !important;
            text-align: center !important;
            text-decoration: none !important;
            box-shadow: 0 4px 15px rgba(0, 255, 170, 0.3) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            margin-top: 15px !important;
        }
        .btn-submit:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5) !important;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-green) 100%) !important;
        }

        a.action-btn {
            background: none !important;
            border: none !important;
            cursor: pointer !important;
            font-size: 16px !important;
            margin-right: 12px !important;
            display: inline-block !important;
            transition: all 0.2s ease !important;
            text-decoration: none !important;
        }
        a.action-btn:hover {
            transform: scale(1.3) translateY(-1px) !important;
        }
        
        a.btn-view { color: var(--neon-cyan) !important; }
        a.btn-view:hover { text-shadow: 0 0 8px var(--neon-cyan); }
        
        a.btn-edit { color: var(--warning) !important; }
        a.btn-edit:hover { text-shadow: 0 0 8px var(--warning); }
        
        a.btn-delete { color: var(--danger) !important; }
        a.btn-delete:hover { text-shadow: 0 0 8px var(--danger); }

        a.btn-submit[style*="background"] {
            background: rgba(255, 255, 255, 0.08) !important;
            color: var(--white) !important;
            border: 1px solid var(--glass-border) !important;
            box-shadow: none !important;
        }
        a.btn-submit[style*="background"]:hover {
            background: rgba(255, 255, 255, 0.15) !important;
        }
        /* =========================================
           CORRECCIONES DE UX (Tablas y Desplegables) 
           ========================================= */
        
        /* 1. Forzar color blanco en los desplegables */
        select.glass-input option {
            background-color: #090d16 !important;
            color: #ffffff !important;
            padding: 10px !important;
        }

        /* 2. Separación visual de datos (Efecto Cebra) en las tablas */
        .glass-table tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
        /* Color de fondo alterno para filas impares */
        .glass-table tbody tr:nth-child(odd) {
            background-color: rgba(255, 255, 255, 0.02) !important;
        }
        /* Hover verde neón sutil para resaltar la fila que estás viendo */
        .glass-table tbody tr:hover {
            background-color: rgba(0, 255, 170, 0.05) !important;
        }

        .glass-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .glass-table th { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--glass-border); }
        .glass-table td { padding: 14px 15px; color: var(--text-main); font-size: 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
        
        .info-group { margin-bottom: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .info-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .info-group p { font-size: 15px; color: var(--white); font-weight: 500; }
        /* CLASES DEL DASHBOARD */
        .welcome-glass { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); padding: 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: var(--glass-glow); border-left: 4px solid var(--neon-cyan); }
        .welcome-glass h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--white); }
        .welcome-glass p { color: var(--text-muted); font-size: 14px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding-bottom: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 170, 0.15); padding: 25px; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.3s ease; text-decoration: none; color: inherit; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .glass-card:hover { transform: translateY(-5px); background: rgba(0, 255, 170, 0.05); border-color: var(--neon-green); box-shadow: 0 10px 25px rgba(0, 255, 170, 0.2); }
        .module-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .module-icon { width: 48px; height: 48px; background: rgba(0, 255, 170, 0.1); color: var(--neon-green); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(0, 255, 170, 0.3); transition: 0.3s; text-shadow: 0 0 8px var(--neon-green); }
        .glass-card:hover .module-icon { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); text-shadow: none; }
        .module-title { font-size: 16px; font-weight: 700; color: var(--white); }
        .module-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
        .module-action { font-size: 13px; font-weight: 600; color: var(--neon-cyan); display: flex; align-items: center; gap: 6px; margin-top: auto; transition: 0.3s; }
        .glass-card:hover .module-action { color: var(--neon-green); transform: translateX(5px); }
    
        .glass-panel-danger { background: var(--glass-bg) !important; border: 1px solid rgba(239, 68, 68, 0.4) !important; border-radius: 12px !important; padding: 25px !important; box-shadow: 0 8px 32px 0 rgba(239, 68, 68, 0.15) !important; flex: 1; display: flex; flex-direction: column; }
        .btn-restore { color: var(--neon-green) !important; background: rgba(0, 255, 170, 0.1) !important; border: 1px solid rgba(0, 255, 170, 0.3) !important; padding: 6px 12px !important; border-radius: 6px !important; font-size: 13px !important; font-weight: 600 !important; text-decoration: none !important; transition: 0.3s !important; display: inline-block; }
        .btn-restore:hover { background: var(--neon-green) !important; color: #090d16 !important; box-shadow: 0 0 10px var(--neon-green) !important; transform: scale(1.05); }
    
    </style>
    

    {% block extra_css %}{% endblock %}

</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="brand-container">
            <div class="brand-logo">
                <i class="fa-solid fa-leaf"></i> 
                <span class="logo-text">Eco<span>CRM</span></span>
            </div>
            <button class="toggle-btn" id="toggleSidebarBtn"><i class="fa-solid fa-bars-staggered"></i></button>
        </div>

        <div class="nav-container">
            <a href="/" class="nav-link" id="nav-inicio"><i class="fa-solid fa-house"></i> <span class="link-text">Inicio</span></a>
            <a href="/pageclientes/" class="nav-link" id="nav-clientes"><i class="fa-solid fa-users"></i> <span class="link-text">Clientes</span></a>
            <a href="/pagecompras/" class="nav-link" id="nav-compras"><i class="fa-solid fa-bag-shopping"></i> <span class="link-text">Compras</span></a>
            <a href="/pageempleados/" class="nav-link" id="nav-empleados"><i class="fa-solid fa-id-badge"></i> <span class="link-text">Empleados</span></a>
            <a href="/pagegrupos/" class="nav-link" id="nav-grupos"><i class="fa-solid fa-folder-tree"></i> <span class="link-text">Grupos / Roles</span></a>
            <a href="/pageinventarios/" class="nav-link" id="nav-inventarios"><i class="fa-solid fa-boxes-stacked"></i> <span class="link-text">Inventarios</span></a>
            <a href="/pagenomina/" class="nav-link" id="nav-nomina"><i class="fa-solid fa-money-check-dollar"></i> <span class="link-text">Nómina</span></a>
            <a href="/pageproductos/" class="nav-link" id="nav-productos"><i class="fa-solid fa-box"></i> <span class="link-text">Productos</span></a>
            <a href="/pageproveedores/" class="nav-link" id="nav-proveedores"><i class="fa-solid fa-truck-ramp-box"></i> <span class="link-text">Proveedores</span></a>
            <a href="/pagesucursal/" class="nav-link" id="nav-sucursal"><i class="fa-solid fa-shop"></i> <span class="link-text">Sucursales</span></a>
            <a href="/pageusuarios/" class="nav-link" id="nav-usuarios"><i class="fa-solid fa-user-shield"></i> <span class="link-text">Usuarios</span></a>
            <a href="/pageventas/" class="nav-link" id="nav-ventas"><i class="fa-solid fa-barcode"></i> <span class="link-text">Ventas</span></a>
        </div>
    </aside>

    <main class="main-content">
        <nav class="navbar">
            <h2>{% block section_title %}<i class="fa-solid fa-circle-nodes" style="color: var(--neon-green);"></i> Panel Central{% endblock %}</h2>
            <div class="user-info">
                <i class="fa-solid fa-user-astronaut" style="color: var(--neon-green);"></i>
                <span>SysAdmin</span>
            </div>
        </nav>
        
        <div class="workspace">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleSidebarBtn');
        
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => { link.classList.remove('active'); });

            if (currentPath === '/' || currentPath === '') { document.getElementById('nav-inicio').classList.add('active'); }
            else if (currentPath.includes('/pageclientes/')) { document.getElementById('nav-clientes').classList.add('active'); }
            else if (currentPath.includes('/pagecompras/')) { document.getElementById('nav-compras').classList.add('active'); }
            else if (currentPath.includes('/pageempleados/')) { document.getElementById('nav-empleados').classList.add('active'); }
            else if (currentPath.includes('/pagegrupos/')) { document.getElementById('nav-grupos').classList.add('active'); }
            else if (currentPath.includes('/pageinventarios/')) { document.getElementById('nav-inventarios').classList.add('active'); }
            else if (currentPath.includes('/pagenomina/')) { document.getElementById('nav-nomina').classList.add('active'); }
            else if (currentPath.includes('/pageproductos/')) { document.getElementById('nav-productos').classList.add('active'); }
            else if (currentPath.includes('/pageproveedores/')) { document.getElementById('nav-proveedores').classList.add('active'); }
            else if (currentPath.includes('/pagesucursal/')) { document.getElementById('nav-sucursal').classList.add('active'); }
            else if (currentPath.includes('/pageusuarios/')) { document.getElementById('nav-usuarios').classList.add('active'); }
            else if (currentPath.includes('/pageventas/')) { document.getElementById('nav-ventas').classList.add('active'); }
        });
    </script>
</body>
</html>
