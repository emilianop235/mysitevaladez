{% extends 'base.html' %}
{% block title %}Editar Proveedor - EcoCRM{% endblock %}
{% block section_title %}<i class="fa-solid fa-pen-to-square" style="color: var(--warning);"></i> Modificar Proveedor{% endblock %}
{% block extra_css %}
<style>
    .glass-panel-center { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 35px; width: 420px; margin: 15px auto; box-shadow: var(--glass-glow); }
    .btn-update { width: 100%; background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%); color: black; border: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 15px; margin-bottom: 10px; }
    .btn-cancel { width: 100%; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 12px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; display: block; text-align: center; text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div style="width: 100%; display: flex; justify-content: center;">
    <div class="glass-panel-center">
        <h3 style="text-align: center; color: var(--warning); margin-bottom: 25px;"><i class="fa-solid fa-handshake"></i> Ajustar Socio Comercial</h3>
        <form method="POST" action="/pageproveedores/editar/{{ proveedor.id }}/">
            {% csrf_token %}
            <div class="form-group"><label>Empresa / Razón Social</label><input type="text" name="nombre" value="{{ proveedor.nombre }}" class="glass-input" required></div>
            <div class="form-group"><label>Contacto / Apellidos</label><input type="text" name="apellido" value="{{ proveedor.apellido }}" class="glass-input" required></div>
            <div class="form-group"><label>Línea Telefónica</label><input type="text" name="telefono" value="{{ proveedor.telefono }}" class="glass-input" required></div>
            <div class="form-group"><label>Dirección Fiscal</label><input type="text" name="direccion" value="{{ proveedor.direccion }}" class="glass-input" required></div>
            <button type="submit" class="btn-update">Actualizar Perfil</button>
            <a href="/pageproveedores/" class="btn-cancel">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
