<main class="main-content">
    <header class="header">
        <h2>Directorio de Proveedores</h2>
        <button class="btn-add" onclick="abrirModal()">
            <i class="fa-solid fa-plus"></i> Nuevo Proveedor
        </button>
    </header>

    <div class="form-card">
        <h3>Registrar Nuevo Proveedor</h3>
        <form action="/pageproveedores/nuevo/" method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group"><label>Nombre</label><input type="text" name="nombre" required></div>
                <div class="form-group"><label>Apellido</label><input type="text" name="apellido" required></div>
                <div class="form-group"><label>Dirección</label><input type="text" name="direccion" required></div>
                <div class="form-group"><label>Teléfono</label><input type="text" name="telefono" required></div>
            </div>
            <button type="submit" class="btn-add">Guardar Registro</button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th><th>Apellido</th><th>Dirección</th><th>Teléfono</th>
                </tr>
            </thead>
            <tbody id="tablaProveedores">
                {% for p in consultaproveedores %}
                <tr>
                    <td><strong>{{ p.nombre }}</strong></td>
                    <td>{{ p.apellido }}</td>
                    <td>{{ p.direccion }}</td>
                    <td>{{ p.telefono }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="4">No hay proveedores registrados.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</main>
