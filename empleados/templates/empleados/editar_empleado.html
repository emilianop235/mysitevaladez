{% extends 'base.html' %}
{% block title %}Editar Colaborador - EcoCRM{% endblock %}
{% block section_title %}<i class="fa-solid fa-pen-to-square" style="color: var(--warning);"></i> Actualización de Expediente{% endblock %}

{% block extra_css %}
<style>
    .glass-panel-center { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 35px; width: 420px; margin: 15px auto; box-shadow: var(--glass-glow); max-height: 85vh; overflow-y: auto; }
</style>
{% endblock %}

{% block content %}
<div style="width: 100%; display: flex; justify-content: center;">
    <div class="glass-panel-center">
        <h3 style="text-align: center; color: var(--warning); margin-bottom: 25px;"><i class="fa-solid fa-user-pen"></i> Ajustar Perfil</h3>
        <form method="POST" action="/pageempleados/editar/{{ empleado.id }}/">
            {% csrf_token %}
            <div class="form-group"><label>Nombre(s)</label><input type="text" name="nombre" value="{{ empleado.nombre }}" class="glass-input" required></div>
            <div class="form-group"><label>Apellidos</label><input type="text" name="apellido" value="{{ empleado.apellido }}" class="glass-input" required></div>
            <div class="form-group">
                <label>Sexo</label>
                <select name="sexo" class="glass-input" required>
                    <option value="Masculino" {% if empleado.sexo == 'Masculino' %}selected{% endif %}>Masculino</option>
                    <option value="Femenino" {% if empleado.sexo == 'Femenino' %}selected{% endif %}>Femenino</option>
                    <option value="Otro" {% if empleado.sexo == 'Otro' %}selected{% endif %}>Otro</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tipo Contrato</label>
                <select name="tipo" class="glass-input" required>
                    <option value="Planta" {% if empleado.tipo == 'Planta' %}selected{% endif %}>Planta</option>
                    <option value="Eventual" {% if empleado.tipo == 'Eventual' %}selected{% endif %}>Eventual</option>
                    <option value="Honorarios" {% if empleado.tipo == 'Honorarios' %}selected{% endif %}>Honorarios</option>
                </select>
            </div>
            <div class="form-group"><label>Salario Base Fijo ($)</label><input type="number" step="0.01" name="salario_base" value="{{ empleado.salario_base }}" class="glass-input" required></div>
            
            <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);">Guardar Cambios</button>
            <a href="/pageempleados/" class="btn-submit" style="background: rgba(255,255,255,0.05) !important; color: var(--text-muted) !important; box-shadow: none;">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
