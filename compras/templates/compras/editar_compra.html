{% extends 'base.html' %}

{% block title %}Editar Orden - EcoCRM{% endblock %}

{% block section_title %}
    <i class="fa-solid fa-pen-to-square" style="color: var(--warning);"></i> Rectificación de Abastecimiento
{% endblock %}

{% block extra_css %}
<style>
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 35px; box-shadow: var(--glass-glow); width: 420px; margin: 10px auto; max-height: 85vh; overflow-y: auto; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .glass-input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); color: var(--white); padding: 10px 12px; border-radius: 8px; font-size: 14px; outline: none; }
    .btn-update { width: 100%; background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%); color: black; border: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 15px; margin-bottom: 10px; }
    .btn-cancel { width: 100%; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 12px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; display: block; text-align: center; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div style="width: 100%; display: flex; align-items: center; justify-content: center;">
    <div class="glass-panel">
        <h3 style="text-align: center; color: var(--warning); margin-bottom: 25px;"><i class="fa-solid fa-pen-clip"></i> Modificar Compra</h3>
        <form method="POST" action="/pagecompras/editar/{{ compra.id }}/">
            {% csrf_token %}
            <div class="form-group"><label>Folio</label><input type="text" name="folio" value="{{ compra.folio }}" class="glass-input" required></div>
            <div class="form-group"><label>Subtotal ($)</label><input type="number" step="0.01" name="subtotal" value="{{ compra.subtotal }}" class="glass-input" required></div>
            <div class="form-group"><label>IVA ($)</label><input type="number" step="0.01" name="iva" value="{{ compra.iva }}" class="glass-input" required></div>
            <div class="form-group"><label>Total ($)</label><input type="number" step="0.01" name="total" value="{{ compra.total }}" class="glass-input" required></div>
            <button type="submit" class="btn-update">Actualizar Datos</button>
            <a href="/pagecompras/" class="btn-cancel">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
