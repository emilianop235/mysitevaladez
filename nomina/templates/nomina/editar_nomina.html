{% extends 'base.html' %}

{% block title %}Modificar Nómina - EcoCRM{% endblock %}

{% block section_title %}
    <i class="fa-solid fa-pen-to-square" style="color: var(--warning);"></i> Rectificación de Comprobante Financiero
{% endblock %}

{% block extra_css %}
<style>
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 30px; box-shadow: var(--glass-glow); width: 440px; margin: 5px auto; max-height: 85vh; overflow-y: auto; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .glass-input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); color: var(--white); padding: 9px 12px; border-radius: 8px; font-size: 14px; outline: none; }
    .btn-update { width: 100%; background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%); color: black; border: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 15px; margin-bottom: 10px; }
    .btn-cancel { width: 100%; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 12px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; display: block; text-align: center; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div style="width: 100%; display: flex; align-items: center; justify-content: center;">
    <div class="glass-panel">
        <h3 style="text-align: center; color: var(--warning); margin-bottom: 20px;"><i class="fa-solid fa-signature"></i> Ajustar Recibo</h3>
        <form method="POST" action="/pagenomina/editar/{{ nomina.id }}/">
            {% csrf_token %}
            <div class="form-group"><label>Periodo</label><input type="text" name="numperiodo" value="{{ nomina.numperiodo }}" class="glass-input" required></div>
            <div class="form-group"><label>Fecha</label><input type="date" name="fecha" value="{{ nomina.fecha|date:'Y-m-d' }}" class="glass-input" required></div>
            
            <div class="form-group">
                <label>Colaborador</label>
                <select name="empleado_id" class="glass-input" required>
                    {% for e in empleados %}
                        <option value="{{ e.id }}" {% if e.id == nomina.empleado.id %}selected{% endif %} style="color: black;">
                            {{ e.nombre }} {{ e.apellido }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group"><label>Salario Base ($)</label><input type="number" step="0.01" name="salario" value="{{ nomina.salario }}" class="glass-input" required></div>
            <div class="form-group"><label>Percepciones ($)</label><input type="number" step="0.01" name="perceciones" value="{{ nomina.perceciones }}" class="glass-input" required></div>
            <div class="form-group"><label>Deducciones ($)</label><input type="number" step="0.01" name="deducciones" value="{{ nomina.deducciones }}" class="glass-input" required></div>
            <div class="form-group"><label>Total ($)</label><input type="number" step="0.01" name="total" value="{{ nomina.total }}" class="glass-input" required></div>
            
            <button type="submit" class="btn-update">Guardar Corrección</button>
            <a href="/pagenomina/" class="btn-cancel">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
