{% extends 'base.html' %}
{% block title %}Editar Rol - EcoCRM{% endblock %}

{% block section_title %}
    <i class="fa-solid fa-pen-to-square" style="color: var(--warning);"></i> Modificación de Privilegios
{% endblock %}

{% block extra_css %}
<style>
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 35px; box-shadow: var(--glass-glow); width: 420px; margin: 15px auto; max-height: 85vh; overflow-y: auto; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
    .glass-input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); color: var(--white); padding: 10px 12px; border-radius: 8px; font-size: 14px; outline: none; }
    .btn-update { width: 100%; background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%); color: black; border: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 15px; margin-bottom: 10px; }
    .btn-cancel { width: 100%; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 12px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; display: block; text-align: center; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div style="width: 100%; display: flex; align-items: center; justify-content: center;">
    <div class="glass-panel">
        <h3 style="text-align: center; color: var(--warning); margin-bottom: 25px;"><i class="fa-solid fa-shield-halved"></i> Ajustar Grupo</h3>
        <form method="POST" action="/pagegrupos/editar/{{ grupo.id }}/">
            {% csrf_token %}
            <div class="form-group"><label>Nombre del Grupo</label><input type="text" name="nombre" value="{{ grupo.nombre }}" class="glass-input" required></div>
            <div class="form-group"><label>Descripción General</label><textarea name="descripcion" class="glass-input" rows="4" required>{{ grupo.descripcion }}</textarea></div>
            <button type="submit" class="btn-update">Guardar Configuración</button>
            <a href="/pagegrupos/" class="btn-cancel">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
