{% extends 'base.html' %}

{% block title %}Editar Operador - EcoCRM{% endblock %}

{% block section_title %}
    <i class="fa-solid fa-user-pen" style="color: var(--warning);"></i> Rectificación de Credenciales
{% endblock %}

{% block extra_css %}
<style>
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 12px; padding: 35px; box-shadow: var(--glass-glow); width: 440px; margin: 5px auto; max-height: 85vh; overflow-y: auto; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
    .glass-input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); color: var(--white); padding: 9px 12px; border-radius: 8px; font-size: 14px; outline: none; }
    .btn-update { width: 100%; background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%); color: black; border: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 15px; margin-bottom: 10px; }
    .btn-cancel { width: 100%; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--glass-border); padding: 12px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; display: block; text-align: center; text-decoration: none; }
</style>
{% endblock %}

{% block content %}
<div style="width: 100%; display: flex; align-items: center; justify-content: center;">
    <div class="glass-panel">
        <h3 style="text-align: center; color: var(--warning); margin-bottom: 20px;"><i class="fa-solid fa-user-gear"></i> Ajustar Cuenta</h3>
        <form method="POST" action="/pageusuarios/editar/{{ usuario_obj.id }}/">
            {% csrf_token %}
            <div class="form-group"><label>Nombre Completo</label><input type="text" name="nombre" value="{{ usuario_obj.nombre }}" class="glass-input" required></div>
            <div class="form-group"><label>Usuario</label><input type="text" name="usuario" value="{{ usuario_obj.usuario }}" class="glass-input" required></div>
            <div class="form-group"><label>Contraseña</label><input type="text" name="passwd" value="{{ usuario_obj.passwd }}" class="glass-input" required></div>
            <div class="form-group"><label>Correo</label><input type="email" name="correo" value="{{ usuario_obj.correo }}" class="glass-input" required></div>
            
            <div class="form-group">
                <label>Grupo / Rol Asignado</label>
                <select name="grupo_id" class="glass-input" required>
                    {% for g in grupos_lista %}
                        <option value="{{ g.id }}" {% if g.id == usuario_obj.grupo.id %}selected{% endif %} style="color: black;">
                            {{ g.nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn-update">Confirmar Ajustes</button>
            <a href="/pageusuarios/" class="btn-cancel">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
