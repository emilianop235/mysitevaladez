<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #047857;
            --bg-gradient: linear-gradient(135deg, #d1fae5 0%, #ecfdf5 100%);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background-color: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.15);
            text-align: center;
        }

        .logo-area { margin-bottom: 30px; }
        .logo-area i { font-size: 48px; color: var(--primary); margin-bottom: 10px; }
        .logo-area h2 { font-size: 24px; font-weight: 700; }
        .logo-area p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .form-group input { 
            width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #d1d5db; 
            border-radius: 8px; outline: none; font-size: 14px; transition: 0.3s; 
        }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2); }

        .btn-login { 
            background-color: var(--primary); color: var(--white); border: none; 
            width: 100%; padding: 12px; border-radius: 8px; font-size: 16px; 
            font-weight: 600; cursor: pointer; transition: 0.3s; 
        }
        .btn-login:hover { background-color: var(--primary-dark); }
        
        .error-msg { color: #ef4444; font-size: 13px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <i class="fa-solid fa-leaf"></i>
            <h2>EcoCRM</h2>
            <p>Ingresa tus datos para acceder</p>
        </div>

        {% if error %}
            <p class="error-msg">{{ error }}</p>
        {% endif %}

        <form action="/pageusuarios/login/" method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Correo Electrónico</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="correo" placeholder="usuario@empresa.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="contraseña" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>
        </form>
    </div>

</body>
</html>
